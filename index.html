<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ESP Mobile FIX</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

/* FULL màn hình thật */
video, canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}
</style>
</head>

<body>

<video id="cam" autoplay playsinline></video>
<canvas id="overlay"></canvas>

<script>
const video = document.getElementById("cam");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

let model;

// ===== CAMERA =====
async function startCam() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" } // cam sau cho mobile
    });
    video.srcObject = stream;
}

// ===== FIX SIZE CHUẨN MOBILE =====
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

// ===== LOAD AI =====
async function loadAI() {
    model = await cocoSsd.load();

    video.onloadedmetadata = () => {
        resizeCanvas();
        detect();
    };
}

// ===== DETECT =====
async function detect() {
    const predictions = await model.detect(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 🎯 TÂM THẬT CỦA MÀN HÌNH
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    predictions.forEach(p => {

        if (p.class === "person" || p.class === "cat" || p.class === "dog") {

            const [x, y, w, h] = p.bbox;

            // scale chuẩn theo màn hình
            const scaleX = canvas.width / video.videoWidth;
            const scaleY = canvas.height / video.videoHeight;

            const sx = x * scaleX;
            const sy = y * scaleY;
            const sw = w * scaleX;
            const sh = h * scaleY;

            const targetX = sx + sw / 2;
            const targetY = sy + sh / 2;

            // ===== ESP BOX =====
            ctx.strokeStyle = "red";
            ctx.lineWidth = 3;
            ctx.strokeRect(sx, sy, sw, sh);

            ctx.fillStyle = "red";
            ctx.font = "16px Arial";
            ctx.fillText(p.class, sx, sy - 5);

            // ===== LINE ESP (CHUẨN FIX) =====
            ctx.beginPath();
            ctx.strokeStyle = "lime";
            ctx.lineWidth = 2;

            ctx.moveTo(centerX, centerY); // tâm màn hình thật
            ctx.lineTo(targetX, targetY); // tới mục tiêu
            ctx.stroke();
        }

    });

    requestAnimationFrame(detect);
}

// ===== START =====
startCam();
loadAI();

// fix xoay màn hình mobile
window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);
</script>

</body>
</html>
