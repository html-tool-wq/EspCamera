<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ESP Mobile PRO FIX</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
}

/* FIX FULL SCREEN REAL MOBILE */
#container {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
}

video, canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<div id="container">
    <video id="cam" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
</div>

<script>
const video = document.getElementById("cam");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

let model;

// ===== CAMERA =====
async function startCam() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    });
    video.srcObject = stream;
}

// ===== FIX CANVAS CHUẨN =====
function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ===== LOAD AI =====
async function loadAI() {
    model = await cocoSsd.load();

    video.onloadeddata = () => {
        resizeCanvas();
        detect();
    };
}

// ===== DETECT =====
async function detect() {
    const predictions = await model.detect(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const scaleX = window.innerWidth / video.videoWidth;
    const scaleY = window.innerHeight / video.videoHeight;

    predictions.forEach(p => {

        if (p.class === "person" || p.class === "cat" || p.class === "dog") {

            const [x, y, w, h] = p.bbox;

            const sx = x * scaleX;
            const sy = y * scaleY;
            const sw = w * scaleX;
            const sh = h * scaleY;

            const targetX = sx + sw / 2;
            const targetY = sy + sh / 2;

            // ===== BOX =====
            ctx.strokeStyle = "red";
            ctx.lineWidth = 3;
            ctx.strokeRect(sx, sy, sw, sh);

            ctx.fillStyle = "red";
            ctx.font = "16px Arial";
            ctx.fillText(p.class, sx, sy - 5);

            // ===== LINE ESP =====
            ctx.beginPath();
            ctx.strokeStyle = "lime";
            ctx.lineWidth = 2;
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();
        }

    });

    requestAnimationFrame(detect);
}

// ===== START =====
startCam();
loadAI();

// ===== FIX MOBILE =====
window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);

// FIX iOS full height
window.addEventListener("load", () => {
    document.body.style.height = window.innerHeight + "px";
});
</script>

</body>
</html>
