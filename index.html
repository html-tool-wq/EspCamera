<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ESP AI + GUI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

#container {
    position: fixed;
    inset: 0;
}

video, canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== GUI ===== */
#menuBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    z-index: 10;
    cursor: pointer;
}

#menu {
    position: fixed;
    top: 50px;
    right: 10px;
    width: 200px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px;
    border-radius: 10px;
    display: none;
    z-index: 10;
}

#menu label {
    display: block;
    margin: 6px 0;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="container">
    <video id="cam" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
</div>

<div id="menuBtn">⚙️</div>

<div id="menu">
    <label><input type="checkbox" id="toggleESP" checked> ESP Box</label>
    <label><input type="checkbox" id="toggleLine" checked> ESP Line</label>
    <label><input type="checkbox" id="toggleText" checked> Label</label>

    <label>Line Width:
        <input type="range" id="lineWidth" min="1" max="10" value="2">
    </label>

    <label>Line Mode:
        <select id="lineMode">
            <option value="top">Top</option>
            <option value="center">Center</option>
        </select>
    </label>
</div>

<script>
const video = document.getElementById("cam");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

let model;

// ===== SETTINGS =====
const settings = {
    esp: true,
    line: true,
    text: true,
    lineWidth: 2,
    lineMode: "top"
};

// ===== GUI =====
const menu = document.getElementById("menu");
document.getElementById("menuBtn").onclick = () => {
    menu.style.display = menu.style.display === "none" ? "block" : "none";
};

document.getElementById("toggleESP").onchange = e => settings.esp = e.target.checked;
document.getElementById("toggleLine").onchange = e => settings.line = e.target.checked;
document.getElementById("toggleText").onchange = e => settings.text = e.target.checked;
document.getElementById("lineWidth").oninput = e => settings.lineWidth = e.target.value;
document.getElementById("lineMode").onchange = e => settings.lineMode = e.target.value;

// ===== OBJECT LIST =====
const livingThings = [
    "person","cat","dog","bird","horse",
    "sheep","cow","elephant","bear","zebra","giraffe"
];

// ===== COLOR =====
function getColor(type){
    return {
        person: "red",
        dog: "lime",
        cat: "cyan",
        bird: "yellow"
    }[type] || "white";
}

// ===== CAMERA =====
async function startCam() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });
    video.srcObject = stream;
}

// ===== DPI =====
function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ===== SCALE =====
function getTransform() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cw = window.innerWidth;
    const ch = window.innerHeight;

    let scale, offsetX = 0, offsetY = 0;

    if (vw/vh > cw/ch) {
        scale = ch / vh;
        offsetX = (vw * scale - cw) / 2;
    } else {
        scale = cw / vw;
        offsetY = (vh * scale - ch) / 2;
    }

    return { scale, offsetX, offsetY };
}

// ===== LOAD AI =====
async function loadAI() {
    model = await cocoSsd.load();

    video.onloadeddata = () => {
        resizeCanvas();
        detect();
    };
}

// ===== DETECT =====
async function detect() {
    const predictions = await model.detect(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const dpr = window.devicePixelRatio || 1;

    const centerX = canvas.width / (2 * dpr);
    const centerY = canvas.height / (2 * dpr);

    const { scale, offsetX, offsetY } = getTransform();

    predictions.forEach(p => {

        if (livingThings.includes(p.class)) {

            const [x, y, w, h] = p.bbox;

            const sx = x * scale - offsetX;
            const sy = y * scale - offsetY;
            const sw = w * scale;
            const sh = h * scale;

            const targetX = sx + sw / 2;
            const targetY = sy + sh / 2;

            const color = getColor(p.class);

            // ===== BOX =====
            if(settings.esp){
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.strokeRect(sx, sy, sw, sh);
            }

            // ===== TEXT =====
            if(settings.text){
                ctx.fillStyle = color;
                ctx.fillText(p.class, sx, sy - 5);
            }

            // ===== LINE =====
            if(settings.line){
                ctx.beginPath();
                ctx.strokeStyle = "lime";
                ctx.lineWidth = settings.lineWidth;

                if(settings.lineMode === "top"){
                    ctx.moveTo(centerX, 0);
                } else {
                    ctx.moveTo(centerX, centerY);
                }

                ctx.lineTo(targetX, targetY);
                ctx.stroke();
            }
        }
    });

    requestAnimationFrame(detect);
}

// ===== START =====
startCam();
loadAI();

window.addEventListener("resize", resizeCanvas);
</script>

</body>
</html>
