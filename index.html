<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ESP AI PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
}

#container {
    position: fixed;
    inset: 0;
}

video, canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<div id="container">
    <video id="cam" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
</div>

<script>
const video = document.getElementById("cam");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

let model;

// ===== DANH SÁCH VẬT THỂ SỐNG =====
const livingThings = [
    "person","cat","dog","bird","horse",
    "sheep","cow","elephant","bear","zebra","giraffe"
];

// ===== MÀU THEO LOẠI =====
function getColor(type){
    const colors = {
        person: "red",
        dog: "lime",
        cat: "cyan",
        bird: "yellow",
        horse: "orange",
        sheep: "pink",
        cow: "white",
        elephant: "purple",
        bear: "brown",
        zebra: "black",
        giraffe: "gold"
    };
    return colors[type] || "lime";
}

// ===== CAMERA =====
async function startCam() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    });
    video.srcObject = stream;
}

// ===== CANVAS DPI FIX =====
function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ===== SCALE + OFFSET =====
function getTransform() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cw = window.innerWidth;
    const ch = window.innerHeight;

    const videoRatio = vw / vh;
    const canvasRatio = cw / ch;

    let scale, offsetX = 0, offsetY = 0;

    if (videoRatio > canvasRatio) {
        scale = ch / vh;
        offsetX = (vw * scale - cw) / 2;
    } else {
        scale = cw / vw;
        offsetY = (vh * scale - ch) / 2;
    }

    return { scale, offsetX, offsetY };
}

// ===== LOAD AI =====
async function loadAI() {
    model = await cocoSsd.load();

    video.onloadeddata = () => {
        resizeCanvas();
        detect();
    };
}

// ===== DETECT =====
async function detect() {
    const predictions = await model.detect(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const dpr = window.devicePixelRatio || 1;

    // 🔝 TOP CENTER
    const startX = canvas.width / (2 * dpr);
    const startY = 0;

    const { scale, offsetX, offsetY } = getTransform();

    predictions.forEach(p => {

        if (livingThings.includes(p.class)) {

            const [x, y, w, h] = p.bbox;

            const sx = x * scale - offsetX;
            const sy = y * scale - offsetY;
            const sw = w * scale;
            const sh = h * scale;

            const targetX = sx + sw / 2;
            const targetY = sy + sh / 2;

            const color = getColor(p.class);

            // ===== BOX =====
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.strokeRect(sx, sy, sw, sh);

            // ===== TEXT =====
            ctx.fillStyle = color;
            ctx.font = "16px Arial";
            ctx.fillText(p.class, sx, sy - 5);

            // ===== LINE ESP =====
            ctx.beginPath();
            ctx.strokeStyle = "lime";
            ctx.lineWidth = 2;
            ctx.moveTo(startX, startY);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();
        }
    });

    requestAnimationFrame(detect);
}

// ===== START =====
startCam();
loadAI();

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);
</script>

</body>
</html>
